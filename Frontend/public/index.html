<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>TalentScanAI</title>
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta name="description" content="TalentScanAI - AI-powered recruitment platform. Find top talent instantly with intelligent resume ranking and job matching.">

	<!-- Prevent dark-mode flash: apply saved theme before first paint -->
	<script>
		if (localStorage.getItem('theme') === 'dark') {
			document.documentElement.classList.add('dark-preload');
			document.addEventListener('DOMContentLoaded', function() {
				document.body.classList.add('dark');
			});
		}
	</script>

	<!-- Inter font from Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="/global.css">
	<link rel="stylesheet" href="/build/bundle.css">
	<link rel="icon" type="image/png" href="/imgs/logo.png">

	<script defer src="/build/bundle.js"></script>
</head>

<body>
</body>
</html>
