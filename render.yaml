services:
  # Backend Web Service
  - type: web
    plan: free
    name: talentscan-backend
    env: python
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_DATABASE_NAME
        value: TalentScanAI
      - key: MONGO_CONNECTION_URL
        sync: false # User will set this securely in dashboard
      - key: JWT_SECRET_KEY
        generateValue: true # Auto-generates a secure random secret
      - key: JWT_EXP_MINUTES
        value: "120"
      - key: RESET_TOKEN_EXP_MINUTES
        value: "15"
      - key: ALLOW_PUBLIC_RECRUITER_SIGNUP
        value: "true"
      - key: EXPOSE_RESET_TOKEN
        value: "false"
      - key: FLASK_DEBUG
        value: "false"
      - key: CORS_ALLOWED_ORIGINS
        value: https://talentscan-frontend.onrender.com # The frontend URL, adjust if renamed

  # Frontend Static Site
  - type: web
    name: talentscan-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: public
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
    # For Svelte SPA router, we redirect all routes to index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
