services:
  backend:
    build: ./Backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGO_DATABASE_NAME: TalentScanAI
      MONGO_CONNECTION_URL: mongodb://mongo:27017/TalentScanAI
      JWT_SECRET_KEY: replace-with-a-long-random-secret
      JWT_EXP_MINUTES: "120"
      RESET_TOKEN_EXP_MINUTES: "15"
      ALLOW_PUBLIC_RECRUITER_SIGNUP: "true"
      EXPOSE_RESET_TOKEN: "false"
      FLASK_DEBUG: "true" # Enabled for auto-restart on code changes
      CORS_ALLOWED_ORIGINS: http://localhost:5000,http://127.0.0.1:5000,http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./Backend:/app # Mount local code for hot-reloading
    depends_on:
      - mongo

  frontend:
    build: 
      context: ./Frontend
      target: build # We use the first stage of the Dockerfile which has all devDependencies
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./Frontend:/app # Mount local code
      - /app/node_modules # Anonymous volume to preserve container-side node_modules
    command: npm run dev -- --host 0.0.0.0 # Run in watch mode
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: change-this-password
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      - mongo

volumes:
  mongo_data:
