services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      MONGO_DATABASE_NAME: TalentScanAI
      MONGO_CONNECTION_URL: mongodb://talentscan:talentscan_dev_password@mongo:27017/TalentScanAI?authSource=admin
      JWT_SECRET_KEY: replace-with-a-long-random-secret
      JWT_EXP_MINUTES: "120"
      RESET_TOKEN_EXP_MINUTES: "15"
      ALLOW_PUBLIC_RECRUITER_SIGNUP: "false"
      EXPOSE_RESET_TOKEN: "false"
      FLASK_DEBUG: "false"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5000,http://localhost:5000,http://127.0.0.1:5173,http://localhost:5173

  mongo:
    image: mongo
    restart: unless-stopped
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: talentscan
      MONGO_INITDB_ROOT_PASSWORD: talentscan_dev_password

  express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://talentscan:talentscan_dev_password@mongo:27017
      ME_CONFIG_BASICAUTH: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: change-this-password
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
