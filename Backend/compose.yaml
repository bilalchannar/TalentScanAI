services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      MONGO_DATABASE_NAME: TalentScanAI
      MONGO_CONNECTION_URL: mongodb://mongo:27017

  mongo:
    image: mongo
    restart: unless-stopped
    ports:
      - 27017:27017
    # Authentication removed for debugging

  express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
